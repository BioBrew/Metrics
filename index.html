<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grounds to Good — Impact Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════
   EASY CUSTOMIZATION — edit these variables to
   change colors, fonts, and sizing site-wide
   ═══════════════════════════════════════════════ */
:root {
  /* Colors */
  --bg:         #0f0a06;       /* page background */
  --surf:       #1a1108;       /* card background */
  --surf2:      #231a0e;       /* slightly lighter card */
  --border:     #2e2010;       /* divider lines */
  --accent:     #c8863c;       /* main orange-brown accent */
  --accent-glow:#c8863c44;
  --gold:       #e8c97a;       /* warm gold highlights */
  --cream:      #f0e6cc;       /* light text */
  --muted:      #7a6040;       /* secondary text */
  --green:      #7ec88a;       /* greenhouse gas color */
  --blue:       #7eb4c8;       /* air pollutant color */
  --danger:     #c87a7a;

  /* Typography — swap these font names to change fonts */
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body:    'DM Sans', system-ui, sans-serif;

  /* Sizing */
  --radius: 4px;
  --gap:    1.5rem;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg); color:var(--cream);
  font-family:var(--font-body); font-size:14px; line-height:1.5;
  min-height:100vh;
  background-image:
    radial-gradient(ellipse 80% 40% at 50% 0%, #2a1a0844 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 0% 100%, #1a0f0533 0%, transparent 50%);
}

/* ── HEADER ── */
header {
  padding: 3rem 3rem 2rem;
  border-bottom: 1px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 1.5rem;
  align-items: flex-end; justify-content: space-between;
  position: relative; overflow: hidden;
}
header::before {
  content: '☕';
  position: absolute; right: 2rem; top: 50%;
  transform: translateY(-50%);
  font-size: 9rem; opacity: 0.04; pointer-events: none;
  line-height: 1;
}
.brand-eyebrow {
  font-family: var(--font-body);
  font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 0.5rem; font-weight: 500;
}
/* ── EDIT SITE TITLE HERE ── */
h1 {
  font-family: var(--font-display);
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 900; color: var(--cream); line-height: 1.05;
}
h1 em { color: var(--accent); font-style: italic; }
/* ── EDIT SITE SUBTITLE HERE ── */
.tagline {
  color: var(--muted); font-size: 14px; margin-top: 0.5rem;
  max-width: 440px; font-weight: 300;
}
.header-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 0.5rem; }
#status {
  font-size: 11px; letter-spacing: 0.12em; padding: 0.35rem 1rem;
  border: 1px solid var(--border); background: var(--surf);
  color: var(--muted); font-family: var(--font-body);
}
#status.live  { border-color: var(--accent); color: var(--accent); }
#status.error { border-color: var(--danger); color: var(--danger); }
#updated { color: var(--muted); font-size: 11px; }
.refresh-btn {
  background: transparent; border: 1px solid var(--border); color: var(--muted);
  font-family: var(--font-body); font-size: 11px; padding: 0.35rem 0.9rem;
  cursor: pointer; letter-spacing: 0.1em; transition: all 0.2s;
}
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── HERO STATS ── */
.hero-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  border-bottom: 1px solid var(--border);
}
.hero-kpi {
  padding: 2rem 2.5rem;
  border-right: 1px solid var(--border);
  position: relative; overflow: hidden;
}
.hero-kpi:last-child { border-right: none; }
.hero-kpi::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--c, var(--accent)), transparent);
  transform: scaleX(0); transform-origin: left;
  transition: transform 1s cubic-bezier(.22,1,.36,1);
}
.hero-kpi.in::after { transform: scaleX(1); }
.kpi-icon { font-size: 1.4rem; margin-bottom: 0.6rem; line-height: 1; }
.kpi-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; font-weight: 500; }
.kpi-value {
  font-family: var(--font-display);
  font-size: clamp(2rem, 3.5vw, 2.8rem);
  font-weight: 900; color: var(--c, var(--accent)); line-height: 1;
}
.kpi-unit { font-size: 12px; color: var(--muted); margin-top: 0.3rem; }

/* ── SECTION LABELS ── */
.section-header {
  padding: 1.5rem 3rem 0.75rem;
  display: flex; align-items: baseline; gap: 1rem;
}
.section-label {
  font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--muted); font-weight: 500;
}
.section-rule { flex: 1; height: 1px; background: var(--border); }
.section-sublabel { font-size: 11px; color: var(--muted); opacity: 0.6; }

/* ── CARD GRID ── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  border-bottom: 1px solid var(--border);
}
.card {
  padding: 1.75rem 2.5rem;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.card:nth-child(even) { border-right: none; }
.card-title {
  font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 1.25rem;
  display: flex; align-items: center; gap: 0.6rem;
}
.card-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--c, var(--accent));
  box-shadow: 0 0 8px var(--c, var(--accent));
  flex-shrink: 0;
}
.chart-wrap { position: relative; height: 210px; }

/* ── WIDE CARD (full width) ── */
.card-wide {
  padding: 1.75rem 2.5rem;
  border-bottom: 1px solid var(--border);
  grid-column: 1 / -1;
}

/* ── GHG vs POLLUTANT SPLIT ── */
.split-header {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-bottom: 1px solid var(--border);
}
.split-label {
  padding: 0.75rem 2.5rem;
  font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
  display: flex; align-items: center; gap: 0.6rem;
}
.split-label:first-child { border-right: 1px solid var(--border); }
.split-pill {
  padding: 0.2rem 0.7rem; border-radius: 2px; font-size: 10px;
  letter-spacing: 0.1em;
}
.pill-green { background: rgba(126,200,138,.15); color: var(--green); border: 1px solid rgba(126,200,138,.3); }
.pill-blue  { background: rgba(126,180,200,.15); color: var(--blue);  border: 1px solid rgba(126,180,200,.3); }

/* ── INSIGHT BAR ── */
.insight-bar {
  padding: 1rem 3rem;
  border-bottom: 1px solid var(--border);
  background: var(--surf);
  font-size: 12px; color: var(--muted);
  display: flex; flex-wrap: wrap; gap: 2rem;
}
.insight-item strong { color: var(--gold); }

/* ── TABLE ── */
.table-section { padding: 1.75rem 2.5rem; border-bottom: 1px solid var(--border); }
.table-scroll  { overflow-x: auto; margin-top: 1rem; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead tr { border-bottom: 1px solid var(--border); }
th { padding: 0.5rem 1rem; text-align: left; color: var(--muted); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 400; white-space: nowrap; }
td { padding: 0.5rem 1rem; border-bottom: 1px solid rgba(200,134,60,.06); white-space: nowrap; }
tr:hover td { background: rgba(200,134,60,.04); }
td.hi   { color: var(--accent); font-weight: 500; text-align: right; }
td.src  { color: var(--gold); }
td.typ  { color: var(--blue); }
td.gram { color: var(--cream); font-weight: 500; text-align: right; }

/* ── SPINNER ── */
.spinner { display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite; }
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FOOTER ── */
footer {
  padding: 1.25rem 3rem;
  display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem;
  color: var(--muted); font-size: 11px;
}

@media(max-width:700px){
  header,footer,.section-header,.hero-kpi,.card,.card-wide,.table-section,.split-label,.insight-bar{padding-left:1.25rem;padding-right:1.25rem}
  .card-grid{grid-template-columns:1fr}
  .card{border-right:none}
  .split-header{grid-template-columns:1fr}
  .split-label:first-child{border-right:none;border-bottom:1px solid var(--border)}
  header::before{display:none}
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══════════════════════════════════════════════ -->
<header>
  <div>
    <div class="brand-eyebrow">Impact Dashboard</div>
    <!-- ✏ EDIT: change site title below -->
    <h1>Grounds to <em>Good</em></h1>
    <!-- ✏ EDIT: change subtitle below -->
    <p class="tagline">Tracking every gram of spent coffee grounds we've diverted from landfill — and the emissions avoided as a result.</p>
  </div>
  <div class="header-meta">
    <div id="updated">—</div>
    <div id="status">LOADING</div>
    <button class="refresh-btn" onclick="loadSheet()">↻ Refresh</button>
  </div>
</header>

<!-- ═══ HERO KPIS ════════════════════════════════════════════ -->
<div class="hero-stats" id="hero-stats"></div>

<!-- ═══ INSIGHT BAR ══════════════════════════════════════════ -->
<div class="insight-bar" id="insight-bar" style="display:none"></div>

<!-- ═══ GROUNDS + SOURCES ════════════════════════════════════ -->
<div class="section-header">
  <span class="section-label">Impact</span>
  <div class="section-rule"></div>
  <span class="section-sublabel">Emissions avoided by repurposing spent coffee grounds</span>
</div>
<div class="card-grid" id="collection-grid"></div>

<!-- emissions-grid kept for JS compatibility, hidden -->
<div id="emissions-grid" style="display:none"></div>

<!-- ═══ DATA TABLE ════════════════════════════════════════════ -->
<div class="table-section" id="table-section" style="display:none">
  <div class="section-label" style="display:flex;align-items:center;gap:.6rem">
    <span style="width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);display:inline-block"></span>
    All Records
  </div>
  <div class="table-scroll"><table id="data-table"></table></div>
</div>

<footer>
  <!-- ✏ EDIT: change footer text below -->
  <span>Grounds to Good · Bioplastics from Spent Coffee</span>
  <span id="row-count"></span>
</footer>

<script>
// ═══════════════════════════════════════════════════════════════
// YOUR GOOGLE SHEET URL — update this if the URL ever changes
// ═══════════════════════════════════════════════════════════════
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT0bbWz_hKAsIoPFIvuiSvykcv9UejbanOWtTODSnWjGU7vL1hgGcLXJbhN0-vdjtBpkQR2a5Al_zmz/pub?gid=531438321&single=true&output=csv';
const PROXY     = 'https://corsproxy.io/?';

// ── Column definitions ─────────────────────────────────────────
// ✏ If you rename columns in your sheet, update these keys
const COL_SOURCING = 'Sourcing';
const COL_TYPE     = 'Type';
const COL_GRAMS    = 'Grams Used';

const GHG_METRICS = [
  { key: 'CO2 Reduced (g)',           label: 'CO₂',          full: 'Carbon Dioxide', color: '#7ec88a' },
  { key: 'Methane (CH4) Reduced (g)', label: 'CH₄',          full: 'Methane',        color: '#a8e6b4' },
  { key: 'Nitrous Oxide (N2O) (g)',   label: 'N₂O',          full: 'Nitrous Oxide',  color: '#c8e8a0' },
];
const AQ_METRICS = [
  { key: 'Leachate Reduced (g)',       label: 'Leachate',    full: 'Leachate',              color: '#7eb4c8' },
  { key: 'Ammonia Reduced (g)',        label: 'NH₃',         full: 'Ammonia',               color: '#90c8e0' },
  { key: 'Nitrogen Oxides (NOx) (g)', label: 'NOₓ',          full: 'Nitrogen Oxides',       color: '#a0d4e8' },
  { key: 'Particulate Matter (PM) (g)',label: 'PM',          full: 'Particulate Matter',    color: '#b8e0f0' },
];
const ALL_METRICS = [...GHG_METRICS, ...AQ_METRICS];

let allRows = [];
const charts = {};

// ── CSV ────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const hdrs  = splitLine(lines[0]);
  return lines.slice(1).map(l => splitLine(l))
    .filter(r => r.some(c => c))
    .map(r => { const o={}; hdrs.forEach((h,i) => o[h.trim()] = (r[i]||'').trim()); return o; });
}
function splitLine(l) {
  const res=[]; let cur='', q=false;
  for (let i=0;i<l.length;i++) {
    const c=l[i];
    if(c==='"'){q=!q;}
    else if(c===','&&!q){res.push(cur);cur='';}
    else cur+=c;
  }
  res.push(cur); return res;
}

// ── Fetch ──────────────────────────────────────────────────────
async function loadSheet() {
  setStatus('loading');
  try {
    const bust = SHEET_URL + '&_cb=' + Date.now();
    const res  = await fetch(PROXY + encodeURIComponent(bust));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    allRows = parseCSV(text);
    if (!allRows.length) throw new Error('Sheet appears empty');
    render();
    setStatus('live');
  } catch(e) {
    setStatus('error', e.message);
  }
}

function setStatus(s, msg, demo) {
  const el = document.getElementById('status');
  const up = document.getElementById('updated');
  el.className = '';
  if (s === 'loading') { el.innerHTML = '<span class="spinner"></span>'; return; }
  if (s === 'live') {
    el.className = 'live';
    el.textContent = demo ? '● DEMO' : '● LIVE';
    up.textContent = 'Updated ' + new Date().toLocaleTimeString();
  } else {
    el.className = 'error';
    el.textContent = '✕ ' + (msg || 'ERROR');
  }
}

// ── Number helpers ─────────────────────────────────────────────
function fmt(n) {
  if (n == null || isNaN(n)) return '—';
  if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(2) + 'M';
  if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return parseFloat(n.toFixed(1)).toLocaleString();
}
function sum(arr, key) { return arr.reduce((s,r) => s + (parseFloat(r[key]) || 0), 0); }
function uniq(arr, key) { return [...new Set(arr.map(r => r[key]).filter(Boolean))]; }

// ── Master render ──────────────────────────────────────────────
function render() {
  renderHero();
  renderInsightBar();
  renderCollection();
  renderEmissions();
  renderTable();
  document.getElementById('row-count').textContent = allRows.length + ' records';
}

// ── Hero KPIs ──────────────────────────────────────────────────
function renderHero() {
  const container = document.getElementById('hero-stats');
  container.innerHTML = '';
  const totalGrams    = sum(allRows, COL_GRAMS);
  const totalCO2      = sum(allRows, 'CO2 Reduced (g)');
  const totalCH4      = sum(allRows, 'Methane (CH4) Reduced (g)');
  const totalN2O      = sum(allRows, 'Nitrous Oxide (N2O) (g)');
  const totalGHG      = totalCO2 + totalCH4 + totalN2O;
  const sources    = parseFloat(allRows[0][COL_SOURCING]) || '—';
  const roastTypes = parseFloat(allRows[0][COL_TYPE])     || '—';

  const kpis = [
    { icon:'☕', label:'Coffee Grounds Diverted', value: fmt(totalGrams), unit:'grams from landfill', color:'var(--accent)' },
    { icon:'🌿', label:'Total GHG Avoided',       value: fmt(totalGHG),   unit:'grams CO₂-equiv.',   color:'var(--green)' },
    { icon:'🏪', label:'Partner Coffee Shops',    value: sources,         unit:'unique sources',      color:'var(--gold)' },
    { icon:'🫘', label:'Roast Types Used',         value: roastTypes,     unit:'different roasts',    color:'var(--blue)' },
  ];

  kpis.forEach(k => {
    const d = document.createElement('div');
    d.className = 'hero-kpi';
    d.style.setProperty('--c', k.color);
    d.innerHTML = `<div class="kpi-icon">${k.icon}</div>
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-unit">${k.unit}</div>`;
    container.appendChild(d);
    requestAnimationFrame(() => requestAnimationFrame(() => d.classList.add('in')));
  });
}

// ── Insight bar ────────────────────────────────────────────────
function renderInsightBar() {
  const bar = document.getElementById('insight-bar');
  const totalGrams = sum(allRows, COL_GRAMS);
  const totalCO2   = sum(allRows, 'CO2 Reduced (g)');
  const perGram    = totalGrams > 0 ? (totalCO2 / totalGrams).toFixed(3) : '—';
  const numSources = parseFloat(allRows[0][COL_SOURCING]) || '?';
  const numTypes   = parseFloat(allRows[0][COL_TYPE])     || '?';

  bar.innerHTML = `
    <span>Each gram of grounds avoids <strong>${perGram}g CO₂</strong></span>
    <span>Sourcing from <strong>${numSources} partner shops</strong></span>
    <span>Across <strong>${numTypes} roast types</strong></span>
  `;
  bar.style.display = 'flex';
}

// ── Collection + Emissions charts ────────────────────────────
function renderCollection() {
  const grid = document.getElementById('collection-grid');
  grid.innerHTML = '';
  const row   = allRows[0];
  const grams = parseFloat(row[COL_GRAMS]) || 0;

  // Chart 1: All GHGs — bar comparing the 3 gases
  addCard(grid, 'col1', 'Greenhouse Gas Reductions (g)', 'var(--green)', () => {
    mkChart('col1', 'bar',
      GHG_METRICS.map(m => m.full),
      [{ label:'Grams Reduced',
         data: GHG_METRICS.map(m => parseFloat(row[m.key]) || 0),
         backgroundColor: GHG_METRICS.map(m => m.color + '99'),
         borderColor:     GHG_METRICS.map(m => m.color),
         borderWidth: 1 }], {});
  });

  // Chart 2: All air pollutants — bar comparing the 4
  addCard(grid, 'col2', 'Air Quality Improvements (g)', 'var(--blue)', () => {
    mkChart('col2', 'bar',
      AQ_METRICS.map(m => m.full),
      [{ label:'Grams Reduced',
         data: AQ_METRICS.map(m => parseFloat(row[m.key]) || 0),
         backgroundColor: AQ_METRICS.map(m => m.color + '99'),
         borderColor:     AQ_METRICS.map(m => m.color),
         borderWidth: 1 }], {});
  });

  // Chart 3: Doughnut — proportional share of every emission avoided
  addCard(grid, 'col3', 'Share of Total Emissions Avoided', 'var(--accent)', () => {
    mkChart('col3', 'doughnut',
      ALL_METRICS.map(m => m.label),
      [{ data: ALL_METRICS.map(m => parseFloat(row[m.key]) || 0),
         backgroundColor: ALL_METRICS.map(m => m.color + 'cc'),
         borderColor:     ALL_METRICS.map(m => m.color),
         borderWidth: 2 }],
      { isDoughnut: true });
  });

  // Chart 4: Grounds used vs total GHG avoided
  addCard(grid, 'col4', 'Coffee Grounds Used vs Total GHG Avoided', 'var(--gold)', () => {
    const totalGHG = GHG_METRICS.reduce((s,m) => s + (parseFloat(row[m.key])||0), 0);
    mkChart('col4', 'bar',
      ['Grounds Used (g)', 'GHG Avoided (g)'],
      [{ label:'Grams',
         data: [grams, totalGHG],
         backgroundColor: ['#c8863c99','#7ec88a99'],
         borderColor:     ['#c8863c',  '#7ec88a'],
         borderWidth: 1 }], {});
  });
}

// renderEmissions is now merged into renderCollection above.
// This stub keeps render() working without changes.
function renderEmissions() {
  document.getElementById('emissions-grid').innerHTML = '';
}

// ── Card builder ───────────────────────────────────────────────
function addCard(grid, id, title, color, chartFn) {
  const c = document.createElement('div');
  c.className = 'card';
  c.innerHTML = `<div class="card-title"><span class="card-dot" style="--c:${color}"></span>${title}</div><div class="chart-wrap"><canvas id="${id}"></canvas></div>`;
  grid.appendChild(c);
  requestAnimationFrame(chartFn);
}

// ── Chart factory ──────────────────────────────────────────────
function mkChart(id, type, labels, datasets, opts={}) {
  if (charts[id]) charts[id].destroy();
  const ctx = document.getElementById(id);
  if (!ctx) return;
  charts[id] = new Chart(ctx, {
    type,
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      indexAxis: opts.indexAxis || 'x',
      plugins: {
        legend: {
          display: datasets.length > 1 || type === 'doughnut',
          labels: { color:'#7a6040', font:{ family:"'DM Sans',sans-serif", size:11 }, boxWidth:10, padding:14 }
        },
        tooltip: {
          backgroundColor:'#1a1108', borderColor:'#2e2010', borderWidth:1,
          titleColor:'#f0e6cc', bodyColor:'#c8863c', padding:12,
          titleFont:{ family:"'DM Sans',sans-serif", size:11 },
          bodyFont:{ family:"'DM Sans',sans-serif", size:12, weight:'500' },
          callbacks:{ label: c => '  ' + fmt(c.parsed?.y ?? c.parsed ?? c.raw) + ' g' }
        }
      },
      scales: opts.isDoughnut ? {} : {
        x: { stacked: opts.stacked||false, grid:{ color:'rgba(200,134,60,.07)' }, ticks:{ color:'#7a6040', font:{ family:"'DM Sans',sans-serif", size:11 }, maxRotation:35 } },
        y: { stacked: opts.stacked||false, grid:{ color:'rgba(200,134,60,.07)' }, ticks:{ color:'#7a6040', font:{ family:"'DM Sans',sans-serif", size:11 }, callback: v => fmt(v) } }
      }
    }
  });
}

// ── Table ──────────────────────────────────────────────────────
function renderTable() {
  document.getElementById('table-section').style.display = '';
  const cols = [COL_SOURCING, COL_TYPE, COL_GRAMS, ...ALL_METRICS.map(m=>m.key)];
  const hdrs = [COL_SOURCING, COL_TYPE, 'Grams Used', ...ALL_METRICS.map(m=>m.label)];
  document.getElementById('data-table').innerHTML = `
    <thead><tr>${hdrs.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${allRows.map(r=>`<tr>
      <td class="src">${r[COL_SOURCING]||'—'}</td>
      <td class="typ">${r[COL_TYPE]||'—'}</td>
      <td class="gram">${fmt(parseFloat(r[COL_GRAMS]))}</td>
      ${ALL_METRICS.map(m=>`<td class="hi">${fmt(parseFloat(r[m.key]))}</td>`).join('')}
    </tr>`).join('')}</tbody>`;
}

// ── Auto-refresh ───────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  loadSheet();
  var cd = 60;
  setInterval(function() {
    cd--;
    var u = document.getElementById('updated');
    if (u && allRows.length) u.textContent = 'Refresh in ' + cd + 's';
    if (cd <= 0) { cd = 60; loadSheet(); }
  }, 1000);
});
</script>
</body>
